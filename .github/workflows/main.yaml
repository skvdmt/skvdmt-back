name: Integration and Deploy
on:
  push:
    branches: [main]
jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}:latest
  deployment:
    needs: [integration]
    runs-on: self-hosted
    steps:
      - name: Run application
        run: |
          docker pull skvdmt/skvdmt-back:latest
          docker stop skvdmt-back
          docker rm skvdmt-back
          docker create --rm \
            --network=skvdmt \
            --name skvdmt-back \
            -e DB_PASSWORD=${{ secrets.POSTGRES_PASSWORD}} \
            skvdmt/skvdmt-back:latest
          mkdir -p /usr/src/migrations /usr/src/migrations/skvdmt-back
          docker cp skvdmt-back:/usr/src/skvdmt-back/schema/. /usr/src/migrations/skvdmt-back
          docker run -it --rm \
            --network=skvdmt \
            --name migration \
            -v "/usr/src/migrations/skvdmt-back:/migrations" \
            migrate/migrate:latest \
              -path /migrations \
              -database 'postgres://${{ vars.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD}}@db:5432/${{ vars.POSTGRES_DB }}?sslmode=disable' \
              up
          docker start skvdmt-back
