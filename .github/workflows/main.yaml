name: Integration and Deploy
on:
  push:
    branches: [main]
jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}:latest
  deployment:
    needs: [integration]
    runs-on: self-hosted
    steps:
      - name: Run application
        run: |
          docker pull skvdmt/abc:latest
          docker stop abc
          docker create --rm -d \
            --network=skvdmt \
            --name abc \
            -p 8000:8000 \
            skvdmt/abc:latest
          docker cp abc:/usr/src/abc/schema /usr/src/migrations/abc
          docker run -it --rm \
            --network=skvdmt \
            --name migration \
            -v "/usr/src/migrations/abc:/migrations" \
            migrate/migrate:latest \
              -path /migrations \
              -database 'postgres://${{ vars.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD}}@db:5432/${{ vars.POSTGRES_DB }}?sslmode=disable' \
              up
          docker start abc
