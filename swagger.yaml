swagger: "2.0"
info:
  title: Sample API
  version: 1.0.0
schemes: ["http"]
host: localhost:8000
paths:
  /:
    post:
      tags: [Samples]
      summary: Create
      description: Posring new sample
      parameters:
      - name: Sample
        in: body
        required: true
        schema:
          $ref: '#/definitions/Sample'
      responses:
        201:
          description: Created
          schema:
            $ref: '#/definitions/ID'
        400:
          description: Bad Request
          schema:
            $ref: '#/definitions/Error'
        415:
          description: Unsupported Media Type
          schema:
            $ref: '#/definitions/Error'
        500:
          description: Internal Server Error
          schema:
            $ref: '#/definitions/Error'
  /{id}:
    get:
      tags: [Samples]
      summary: Read
      description: Getting sample by id
      parameters:
      - name: id
        in: path
        type: integer
        format: int32
        description: Sample ID
        required: true
      responses:
        200:
          description: "OK"
          schema:
            $ref: '#/definitions/Sample'
        400:
          description: Bad Request
          schema:
            $ref: '#/definitions/Error'
        404:
          description: Not Found
          schema:
            $ref: '#/definitions/Error'
        500:
          description: Internal Server Error
          schema:
            $ref: '#/definitions/Error'
    put:
      tags: [Samples]
      summary: Update
      description: Updating sample by id
      parameters:
      - name: id
        in: path
        type: integer
        format: int32
        description: Sample ID
        required: true
      - name: title
        in: query
        type: string
        description: New title of Sample
      responses:
        200:
          description: "OK"
          schema:
            $ref: '#/definitions/Sample'
        400:
          description: Bad Request
          schema:
            $ref: '#/definitions/Error'
        404:
          description: Not Found
          schema:
            $ref: '#/definitions/Error'
        500:
          description: Internal Server Error
          schema:
            $ref: '#/definitions/Error'
    delete:
      tags: [Samples]
      summary: Delete
      description: Deleting sample by id
      parameters:
      - name: id
        in: path
        type: integer
        format: int32
        description: Sample ID
        required: true
      responses:
        200:
          description: "OK"
          schema:
            $ref: '#/definitions/Sample'
        400:
          description: Bad Request
          schema:
            $ref: '#/definitions/Error'
        404:
          description: Not Found
          schema:
            $ref: '#/definitions/Error'
        500:
          description: Internal Server Error
          schema:
            $ref: '#/definitions/Error'
definitions:
  ID:
    type: object
    properties:
      id:
        type: integer
        format: int32
        example: 1
  Sample:
    type: object
    properties:
      title:
        type: string
        minLength: 4
        maxLength: 50
        example: Sample title example
  Error:
    type: object
    properties:
      message:
        type: string
        example: short error message
tags:
- name: Samples
  description: Samples tag description
