services:
  db:
    image: postgres:18.0-alpine
    container_name: db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 4s
      retries: 5
      start_period: 3s
    volumes:
      - pgdata:/var/lib/postgresql/data
  migrate:
    image: migrate/migrate:v4.19.0
    container_name: migrate
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./schema:/migrations
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable",
        "up",
      ]
  skvdmt-back:
    # image: skvdmt-back:1.0.0
    # build: .
    build:
      dockerfile: ./Dockerfile.dev
    stop_grace_period: -1s
    container_name: skvdmt-back
    ports:
      - 8000:8000
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      - MODE=${MODE}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - ~/log/skvdmt-back:/var/log/skvdmt-back
      - ./config:/etc/skvdmt-back
      - ./build:/usr/local/bin
volumes:
  pgdata:


# docker run -it --rm --network=skvdmt-back_default --name migration -v "./schema:/migrations" migrate/migrate:v4.19.0 -path /migrations -database 'postgres://postgres:password@db:5432/skvdmt_ru?sslmode=disable' up